<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Conquered</title>
<style>
:root{--bg:#f5f5f0;--card:#f9f9f7;--ink:#3a3a36;--muted:#888878;--line:#e0e0d8;--accent:#5a5a4a;--good:#6b8c6a;--chip:#f0f0e8;--todo:#8b7a5a}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;font-family:'Courier New',Courier,monospace;color:var(--ink);font-size:13px;line-height:1.6}
body{display:flex;flex-direction:column;height:100vh;background:var(--bg);border:1px solid var(--line)}
header{padding:10px 14px;border-bottom:2px solid var(--ink);background:var(--bg);display:flex;gap:8px;align-items:center;flex-wrap:wrap;z-index:10;text-transform:uppercase;letter-spacing:2px}
h1{font-size:14px;margin:0;font-weight:bold}
#mainContent{flex:1;display:flex;overflow:hidden;margin-bottom:60px}
#mapContainer{flex:1;min-height:0;background:#dfe6e9}
</style>
</head>
<body>
<header>
  <h1>Conquered</h1>
  <div id="authSection"></div>
</header>
<div id="mainContent">
  <div id="mapContainer"></div>
</div>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCkTOWPcSGNvApDDYUXFskZKvuqnOz5dw4&libraries=places"></script>
<script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyA7gvfj8fVzphPPGRUfWXtLfwQ9cK3CAbE",authDomain:"conquered-sf.firebaseapp.com",projectId:"conquered-sf",storageBucket:"conquered-sf.appspot.com",messagingSenderId:"523098241849",appId:"1:523098241849:web:f4c3e5d7c8e2a1b0"};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();

let SEED=[],map,currentUser=null;

const $ = id => document.getElementById(id);

auth.onAuthStateChanged(user => {
  if(user) {
    currentUser = user;
    document.getElementById('authSection').innerHTML = `<span>${user.email}</span><button onclick="logout()" style="margin-left:10px">Logout</button>`;
    init();
    fetch("data/bars_full.json").then(r=>r.json()).then(d=>{
      SEED = Array.isArray(d) ? d : d.bars;
      buildMap();
      buildMarkers();
    });
  } else {
    document.getElementById('authSection').innerHTML = `<button onclick="googleLogin()" style="padding:8px 16px;background:#5a5a4a;color:white;border:none;cursor:pointer">Sign in with Google</button>`;
  }
});

function googleLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

function logout() {
  auth.signOut();
}

function init() {
  if(!map) buildMap();
}

function buildMap() {
  map = new google.maps.Map($("mapContainer"), {
    center: {lat: 37.7749, lng: -122.4194},
    zoom: 12
  });
}

function buildMarkers() {
  SEED.forEach(bar => {
    const marker = new google.maps.Marker({
      position: {lat: bar.lat, lng: bar.lon},
      map: map,
      title: bar.name
    });
    marker.addListener("click", () => {
      const infoWindow = new google.maps.InfoWindow({
        content: `<div style="padding:8px"><strong>${bar.name}</strong><br>${bar.neighborhood}</div>`
      });
      infoWindow.open(map, marker);
    });
  });
}
</script>
</body>
</html>
